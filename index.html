<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adaptive Trivia</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    #app {
      max-width: 500px;
      margin: 40px auto;
      text-align: center;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-weight: bold;
      font-size: 14px;
    }

    h2 {
      color: #000;
      font-size: 20px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      background: #1e6bff;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1557d6;
    }

    button:active {
      transform: scale(0.99);
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script src="app.js"></script>
</body>
</html>
